steps:
  # Step 0: Build frontend
  - name: 'gcr.io/cloud-builders/npm'
    args: ['install']
    id: 'install-deps'

  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'build']
    id: 'build-frontend'
    waitFor: ['install-deps']

  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/maraai:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/maraai:latest'
      - '-f'
      - 'Dockerfile.nodejs'
      - '.'
    id: 'build-image'
    waitFor: ['build-frontend']

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/maraai:$SHORT_SHA']
    id: 'push-image'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/maraai:latest']
    id: 'push-latest'
    waitFor: ['build-image']

  # Step 3: Deploy to CloudRun
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=cloudrun-deploy.yaml
      - --image=gcr.io/$PROJECT_ID/maraai:$SHORT_SHA
      - --location=europe-west1
      - --cluster=maraai-prod
    id: 'deploy-cloudrun'
    waitFor: ['push-image']

  # Step 4: Health check
  - name: 'gcr.io/cloud-builders/kubectl'
    args: ['get', 'service', 'maraai']
    env:
      - 'CLOUDSDK_COMPUTE_REGION=europe-west1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=maraai-prod'
    id: 'verify-deploy'
    waitFor: ['deploy-cloudrun']

# Build configuration
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  

# Build triggers
substitutions:
  _REGION: 'europe-west1'
  _SERVICE_NAME: 'maraai'

# Timeout for build
timeout: '3600s'

# Images to be pushed to registry
images:
  - 'gcr.io/$PROJECT_ID/maraai:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/maraai:latest'

# Branch trigger (optional - set in Cloud Build console)
# filename: cloudbuild.yaml
# branchName: 'main'
