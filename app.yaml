runtime: python311
instance_class: F1

# Setări pentru a preveni costurile inutile și a asigura stabilitatea
automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 1
  max_instances: 1

entrypoint: gunicorn -t 120 -b :$PORT main:app

env_variables:
  DATABASE_URL: 'postgresql+psycopg2://postgres:Mara-AI-2026-DB-Pass%21@/postgres?host=/cloudsql/maraai-488fb:europe-west1:mara-ai-db'
  SECRET_KEY: "a_very_long_and_super_secret_random_string_for_mara_ai_2026"

# Această secțiune este CHEIA pentru a vedea login.html
handlers:
  # Servește doar fișierele statice reale (imagini, js, css) direct
  - url: /(.*\.(css|js|png|jpg|jpeg|gif|ico|json|map|svg|woff|woff2|ttf|eot))$
    static_files: frontend/dist/\1
    upload: frontend/dist/(.*\.(css|js|png|jpg|jpeg|gif|ico|json|map|svg|woff|woff2|ttf|eot))$

  # Toate celelalte rute sunt trimise către main.py (Flask)
  - url: /.*
    script: auto