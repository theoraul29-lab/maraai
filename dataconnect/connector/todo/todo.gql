mutation CreateTodo($text: String!) @auth(level: USER, insecureReason: "MVP shared todo access enabled intentionally") {
  todo_insert(data: { text: $text })
}

mutation ToggleTodo($id: UUID!, $completed: Boolean!) @auth(level: USER, insecureReason: "MVP shared todo access enabled intentionally") {
  todo_update(key: { id: $id }, data: { completed: $completed })
}

mutation DeleteTodo($id: UUID!) @auth(level: USER, insecureReason: "MVP shared todo access enabled intentionally") {
  todo_delete(key: { id: $id })
}

query GetTodoById($id: UUID!) @auth(level: USER, insecureReason: "MVP shared todo access enabled intentionally") {
  todo(key: { id: $id }) {
    id
    text
    completed
  }
}
