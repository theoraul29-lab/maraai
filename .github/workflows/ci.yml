name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: development
      AUTH_MODE: local
      SESSION_SECRET: ci-session-secret
      PORT: 3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start backend and run smoke tests
        run: |
          set -euo pipefail

          cleanup() {
            if [ -f backend.pid ]; then
              kill "$(cat backend.pid)" || true
            fi
          }
          trap cleanup EXIT

          nohup npm run start:backend > backend.log 2>&1 &
          echo $! > backend.pid

          HEALTHY_PORT=""
          for i in {1..90}; do
            for port in $(seq 3001 3021); do
              if curl -fsS "http://localhost:${port}/api/health" >/dev/null; then
                HEALTHY_PORT="$port"
                break
              fi
              if curl -fsS "http://localhost:${port}/health" >/dev/null; then
                HEALTHY_PORT="$port"
                break
              fi
              if curl -fsS "http://localhost:${port}/api/runtime" >/dev/null; then
                HEALTHY_PORT="$port"
                break
              fi
            done
            if [ -n "$HEALTHY_PORT" ]; then
              break
            fi
            sleep 2
          done

          if [ -z "$HEALTHY_PORT" ]; then
            echo "Backend did not become healthy in time"
            echo "===== backend.log (tail) ====="
            tail -n 200 backend.log || true
            exit 1
          fi

          export MARAAI_BASE_URL="http://localhost:${HEALTHY_PORT}"
          echo "Backend is healthy on port ${HEALTHY_PORT}"
          curl -fsS "$MARAAI_BASE_URL/api/runtime" || true

          echo "Using MARAAI_BASE_URL=$MARAAI_BASE_URL"
          npm run smoke:runtime

      - name: Print backend logs on failure
        if: failure()
        run: |
          echo "===== backend.log ====="
          cat backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi
