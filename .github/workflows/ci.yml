name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: development
      AUTH_MODE: local
      SESSION_SECRET: ci-session-secret
      PORT: 3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start backend
        run: |
          nohup npm run start:backend > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend health
        run: |
          for i in {1..90}; do
            for port in $(seq 3001 3021); do
              if curl -fsS "http://localhost:${port}/api/health" >/dev/null; then
                echo "Backend is healthy on port ${port}"
                echo "MARAAI_BASE_URL=http://localhost:${port}" >> "$GITHUB_ENV"
                exit 0
              fi
            done
            sleep 2
          done

          echo "Backend did not become healthy in time"
          if [ -f backend.log ]; then
            echo "===== backend.log (tail) ====="
            tail -n 200 backend.log || true
          fi
          exit 1

      - name: Print runtime endpoint
        run: |
          curl -fsS "$MARAAI_BASE_URL/api/runtime" || true

      - name: Runtime smoke tests
        run: |
          echo "Using MARAAI_BASE_URL=$MARAAI_BASE_URL"
          npm run smoke:runtime

      - name: Print backend logs on failure
        if: failure()
        run: |
          echo "===== backend.log ====="
          cat backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi
