name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: development
      AUTH_MODE: local
      SESSION_SECRET: ci-session-secret
      PORT: 3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Debug workspace
        run: ls -la

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start backend and run smoke tests
        shell: bash
        run: |
          set -eo pipefail

          cleanup() {
            if [ -f backend.pid ]; then
              pid="$(cat backend.pid || true)"
              if [ -n "$pid" ]; then
                kill "$pid" || true
              fi
            fi
          }
          trap cleanup EXIT

          check_port () {
            local port="$1"
            curl -fsS "http://localhost:${port}/api/health"  >/dev/null 2>/dev/null && return 0
            curl -fsS "http://localhost:${port}/health"      >/dev/null 2>/dev/null && return 0
            curl -fsS "http://localhost:${port}/api/runtime" >/dev/null 2>/dev/null && return 0
            return 1
          }

          nohup npm run start:backend > backend.log 2>&1 &
          echo $! > backend.pid

          echo "::group::backend health-check"
          HEALTHY_PORT=""
          for i in $(seq 1 90); do
            for port in $(seq 3001 3021); do
              if check_port "$port"; then
                HEALTHY_PORT="$port"
                break
              fi
            done

            if [ -n "$HEALTHY_PORT" ]; then
              break
            fi

            if (( i % 10 == 0 )); then
              echo "Waiting for backend... (attempt ${i}/90)"
            fi

            sleep 2
          done
          echo "::endgroup::"

          if [ -z "$HEALTHY_PORT" ]; then
            echo "::group::backend.log (tail)"
            tail -n 200 backend.log || true
            echo "::endgroup::"
            echo "::error::Backend did not become healthy in time"
            exit 1
          fi

          export MARAAI_BASE_URL="http://localhost:${HEALTHY_PORT}"
          echo "Backend is healthy on port ${HEALTHY_PORT}"
          curl -fsS "$MARAAI_BASE_URL/api/runtime" || true

          echo "Using MARAAI_BASE_URL=$MARAAI_BASE_URL"
          npm run smoke:runtime
          npm run smoke:credits
          npm run smoke:growth
          npm run smoke:audit-p2
          npm run smoke:auth

      - name: Print backend logs on failure
        if: failure()
        run: |
          echo "::group::backend.log"
          cat backend.log || true
          echo "::endgroup::"

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi
          rm -f backend.pid