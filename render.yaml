services:
  - type: web
    name: maraai
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///var/data/maraai.sqlite
      - key: AUTH_MODE
        value: local
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
