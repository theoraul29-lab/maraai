# Production App Engine Configuration for Node.js
runtime: nodejs20

# Scaling - single F1 instance for cost control, scale up if needed
automatic_scaling:
  min_instances: 1
  max_instances: 2
  target_cpu_utilization: 0.65
  target_throughput_utilization: 0.75

# Environment variables (set sensitive ones in GCP Console or Secret Manager)
env_variables:
  NODE_ENV: "production"
  PORT: "8080"
  HOST: "0.0.0.0"
  # API keys and secrets should be set in GCP Secret Manager, not here
  # Use: gcloud secrets create GEMINI_API_KEY --data-file=<(echo 'your_key')
  # Then reference in app.yaml via secret volumes

# Health check
health_check:
  enable_health_check: true
  check_interval_sec: 5
  timeout_sec: 4
  unhealthy_threshold: 2
  healthy_threshold: 2
  path: "/api/health"
  host: "localhost"

# VPC Connector for Cloud SQL (if using PostgreSQL)
# vpc_access_connector:
#   name: "projects/maraai-488fb/locations/europe-west1/connectors/maraai-sql"

# Cloud SQL connections (if using Cloud SQL)
# cloud_sql_instances: "maraai-488fb:europe-west1:maraai-postgres"

# Entrypoint
entrypoint: npm run start

# Handlers for static content optimization
handlers:
  # Cache static assets for 1 year (files with content hash)
  - url: /assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$
    secure: always
    redirect_http_response_code: 301
    static_files: frontend/dist/assets/\1
    upload: frontend/dist/assets/.*
    expiration: "365d"

  # API routes go to Node.js server
  - url: /api/.*
    secure: always
    redirect_http_response_code: 301
    script: auto

  # WebSocket endpoint
  - url: /ws
    secure: always
    redirect_http_response_code: 301
    script: auto

  # Everything else (SPA fallback)
  - url: /.*
    secure: always
    redirect_http_response_code: 301
    static_files: frontend/dist/index.html
    upload: frontend/dist/index.html
